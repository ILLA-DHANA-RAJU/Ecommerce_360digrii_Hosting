{% extends "base.html" %} {% load static %} {% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}" />

<div class="login-container">
  <div class="login-box">
    {% if error %}
    <p style="color: rgba(216, 43, 43, 0.716); font-weight: bold; margin-bottom: 10px" id="id1">{{ error }}</p>
    {% endif %} {% if messages %} {% for msg in messages %}
    <p style="color: green; font-weight: bold; margin-bottom: 10px" id="id1">{{ msg }}</p>
    {% endfor %} {% endif %}
    <h1>Login</h1>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />

      <button type="submit" class="submit-btn">Login</button>
      <button type="reset" class="reset-btn">Clear</button>
    </form>

    <p class="signup-text">Not registered? <a href="{% url 'signup' %}" onclick="acc()">Signup</a></p>
  </div>
</div>
<script src="{% static 'js/login.js'%}"></script>
{% endblock %}
