{% extends "base.html" %} {% load static %} {% block content %}
<link rel="stylesheet" href="{% static 'css/vendor_signup.css' %}" />

<div class="signup-container">
  <div class="signup-box">
    {% if error %}
    <p style="color: rgba(216, 43, 43, 0.716); font-weight: bold; margin-bottom: 10px" id="id1">{{ error }}</p>
    {% endif %} {% if messages %} {% for msg in messages %}
    <p style="color: green; font-weight: bold; margin-bottom: 10px" id="id1">{{ msg }}</p>
    {% endfor %} {% endif %}
    <h1>Create Your Account</h1>
    <br />
    <p class="subtitle">Become a Best Seller</p>

    <form method="POST" action="{% url 'vendor_signin' %}" enctype="multipart/form-data">
      {% csrf_token %}

      <input type="text" name="firstname" placeholder="First Name" required />
      <input type="text" name="lastname" placeholder="Last Name" required />

      <input type="email" name="email" placeholder="Email Address" required />
      <input type="number" name="mobile" placeholder="Mobile Number" required />
      <input type="password" name="password" placeholder="Create Password" required />

      <select name="category" required>
        <option value="">Select Category Type</option>
        <option value="Electronics">Electronics</option>
        <option value="Garments">Garments</option>
        <option value="Groceries">Groceries</option>
        <option value="Appliances">Appliances</option>
      </select>
      <input type="file" name="image" required />
      <div class="btn-section">
        <input type="submit" value="Submit" />
        <input type="reset" value="Clear" />
      </div>

      <div class="signin">
        <p>Already have an account? <a href="{% url 'vendor_login' %}">Login</a></p>
      </div>
    </form>
  </div>
</div>

<script src="{% static 'js/login.js'%}"></script>

{% endblock %}
