{% extends "vendor_base.html" %} {% load static %} {% block content %}
<link rel="stylesheet" href="{% static 'css/product_manage.css'%}" />
<link rel="stylesheet" href="https://cdn.datatables.net/2.3.5/css/dataTables.dataTables.css" />
<div class="product">
  <div class="add-product-box">
    <a href="{% url 'add_product' %}" class="add-btn">Add Product</a>
  </div>
  <div class="table_data">
    <table id="table">
      <center>
        {% if messages %}
        <div
          style="background-color: white; border-radius: 5px; box-shadow: 0px 5px 13px rgb(68, 60, 60); width: 300px"
          id="id1"
        >
          {% for msg in messages %}
          <p style="padding: 20px; color: black; font-size: 1rem; text-align: center">{{ msg }}</p>
          {% endfor %}
        </div>
        {% endif %}
      </center>
      <thead>
        <tr class="table-head">
          <th>SI.NO</th>
          <th>Prduct Name</th>
          <th>Product Category</th>
          <th>Product Price</th>
          <th>Product Stock</th>
          <th>Product Image</th>
          <th>Product Video</th>
          <th>Operations</th>
        </tr>
      </thead>
      <tbody>
        <!-- {% if fetch %} {% for data in fetch %}
        <tr class="class-data">
          <td>{{ data.product_name }}</td>
          <td>{{ data.product_type }}</td>
          <td>{{ data.product_price }}</td>
          <td>{{ data.product_stock }}</td>
          <td>{{ data.product_status }}</td>
          <td class="img-box">
            <img src="/media/{{ data.product_image }}" alt="loading.." />
          </td>
          <td>
            {% if data.product_video %}
            <video width="200px" height="100px" controls>
              <source src="/media/{{ data.product_video }}" alt="Video loading..." type="video/mp4" />
            </video>
            {% else %}
            <p>Video Not Uploaded</p>
            {% endif %}
          </td>
          <td>
            <a href="{% url 'update_products' data.product_id %}" class="update">Update</a>
          </td>
          <td>
            <a href="{% url 'delete_products' data.product_id %}" class="delete" onclick="return pdel()">Delete</a>
          </td>
        </tr>
        {% endfor %} {% endif %} -->
      </tbody>
    </table>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="{% static 'js/profile.js' %}"></script>

<script>
  $(document).ready(function () {
    $('#table').DataTable({
      processing: true,
      serverSide: true,
      ajax: {
        url: "{% url 'api_product_data' %}",
        type: 'GET'
      },
      columns: [
        { data: 'si' },
        { data: 'name' },
        { data: 'type' },
        { data: 'price' },
        { data: 'stock' },
        { data: 'image' },
        { data: 'video' },
        { data: 'operations' }
      ]
    })
  })
</script>

{% endblock %}
